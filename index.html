<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InstantAPI Generator</title>
  <meta name="description" content="Generate a structured Express API dynamically from your PostgreSQL schema">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Styling System & Tokens */
    :root {
      --bg-dark: #09090b;
      --card-bg: rgba(24, 24, 27, 0.7);
      --text-main: #fafafa;
      --text-muted: #a1a1aa;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --error: #ef4444;
      --glass-border: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(39, 39, 42, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(29, 78, 216, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* Container Glassmorphism */
    .generator-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 3rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      animation: fadeSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Typography & Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    /* Form Elements */
    .input-group {
      margin-bottom: 2rem;
      position: relative;
    }

    label {
      display: block;
      margin-bottom: 0.75rem;
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    input[type="text"] {
      width: 100%;
      padding: 1.1rem 1.25rem;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      color: var(--text-main);
      font-size: 1rem;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
      background: rgba(39, 39, 42, 0.8);
    }

    input::placeholder {
      color: #52525b;
    }

    /* Animated Button */
    button {
      width: 100%;
      padding: 1.1rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    button:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      background: #3f3f46;
      color: #a1a1aa;
      cursor: not-allowed;
    }

    /* Loading Spinner */
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    button:disabled .spinner {
      border-top-color: #a1a1aa;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Feedback Messages */
    .status-message {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 500;
      min-height: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .status-message.show { opacity: 1; }
    .status-message.success { color: var(--success); }
    .status-message.error { color: var(--error); }

    /* Decoration */
    .glow {
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.5), rgba(192, 132, 252, 0.5));
      border-radius: 26px;
      z-index: -1;
      filter: blur(12px);
      opacity: 0;
      transition: opacity 0.5s;
    }
    
    .generator-card:focus-within .glow {
      opacity: 0.3;
    }
  </style>
</head>
<body>

  <div class="generator-card">
    <div class="glow"></div>
    <div class="header">
      <h1>InstantAPI Generator</h1>
      <p>Seamlessly harvest your PostgreSQL schema and build a fully-functional Express backend in seconds.</p>
    </div>

    <div class="input-group">
      <label for="dbUrl">PostgreSQL Connection URL</label>
      <input type="text" id="dbUrl" placeholder="postgres://user:password@localhost:5432/dbname" aria-label="Database URL" autocomplete="off" />
    </div>

    <button id="generateBtn">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">Generate API</span>
    </button>

    <div id="statusMessage" class="status-message"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const generateBtn = document.getElementById('generateBtn');
      const dbUrlInput = document.getElementById('dbUrl');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');
      const statusMessage = document.getElementById('statusMessage');

      const setLoadingState = (isLoading) => {
        generateBtn.disabled = isLoading;
        spinner.style.display = isLoading ? 'block' : 'none';
        btnText.textContent = isLoading ? 'Synthesizing API...' : 'Generate API';
      };

      const showFeedback = (message, type) => {
        statusMessage.textContent = message;
        statusMessage.className = 'status-message'; // reset
        if (type) {
          statusMessage.classList.add(type, 'show');
        }
      };

      generateBtn.addEventListener('click', async () => {
        const dbUrl = dbUrlInput.value.trim();

        if (!dbUrl) {
          showFeedback('A valid connection URL is required.', 'error');
          dbUrlInput.focus();
          return;
        }

        setLoadingState(true);
        showFeedback('', '');

        try {
          const response = await fetch('http://localhost:3000/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ dbUrl })
          });

          if (!response.ok) {
            let errorMsg = 'Failed to compile API. Please check your URL.';
            try {
              const errorData = await response.json();
              if (errorData.error) errorMsg = errorData.error;
            } catch (e) {
              // ignore json parse error
            }
            throw new Error(errorMsg);
          }

          const blob = await response.blob();
          if (blob.size === 0) {
            throw new Error('Received an empty file from the server.');
          }
          
          // Trigger file download using Blob URL and synthetic anchor click
          const downloadUrl = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.style.display = 'none';
          a.href = downloadUrl;
          a.download = 'my-api.zip';
          
          document.body.appendChild(a);
          a.click();
          
          // Cleanup
          window.URL.revokeObjectURL(downloadUrl);
          document.body.removeChild(a);

          showFeedback('Success! Your API archive is ready.', 'success');
          
          // Clear input on success
          setTimeout(() => {
            dbUrlInput.value = '';
          }, 1500);

        } catch (error) {
          showFeedback(error.message, 'error');
        } finally {
          setLoadingState(false);
        }
      });
      
      // Allow 'Enter' key press in input field to trigger generation
      dbUrlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          generateBtn.click();
        }
      });
    });
  </script>
</body>
</html>
